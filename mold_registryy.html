<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mold Register</title>

<style>
body {
  font-family: sans-serif;
  background:#0f1117;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box {
  background:#1a1d27;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.pin-dots {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

.pin-dot {
  width:15px;
  height:15px;
  border-radius:50%;
  border:2px solid #555;
}

.pin-dot.filled {
  background:#4f8ef7;
}

.pin-keypad {
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:10px;
}

.pin-key {
  padding:15px;
  font-size:20px;
  background:#222535;
  border:none;
  border-radius:10px;
  color:white;
}

#mainApp {
  display:none;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Mold Register</h2>
    <p>ใส่รหัส 4 หลัก</p>

    <div class="pin-dots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>

    <div class="pin-keypad">
      <button class="pin-key" data-v="1">1</button>
      <button class="pin-key" data-v="2">2</button>
      <button class="pin-key" data-v="3">3</button>
      <button class="pin-key" data-v="4">4</button>
      <button class="pin-key" data-v="5">5</button>
      <button class="pin-key" data-v="6">6</button>
      <button class="pin-key" data-v="7">7</button>
      <button class="pin-key" data-v="8">8</button>
      <button class="pin-key" data-v="9">9</button>
      <button></button>
      <button class="pin-key" data-v="0">0</button>
      <button class="pin-key" id="delBtn">⌫</button>
    </div>

    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- MAIN -->
<div id="mainApp">
  <h1>✅ เข้าใช้งานสำเร็จ</h1>
  <p>นี่คือหน้า Mold Register ของคุณ</p>
</div>

<script>
let pin = "";
const correctPin = "1234"; // 🔐 เปลี่ยนรหัสตรงนี้

const dots = document.querySelectorAll(".pin-dot");
const keys = document.querySelectorAll(".pin-key[data-v]");
const delBtn = document.getElementById("delBtn");
const error = document.getElementById("error");

keys.forEach(btn => {
  btn.addEventListener("click", () => {
    if (pin.length < 4) {
      pin += btn.dataset.v;
      updateDots();
    }

    if (pin.length === 4) {
      checkPin();
    }
  });
});

delBtn.addEventListener("click", () => {
  pin = pin.slice(0, -1);
  updateDots();
});

function updateDots() {
  dots.forEach((dot, i) => {
    dot.classList.toggle("filled", i < pin.length);
  });
}

function checkPin() {
  if (pin === correctPin) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
  } else {
    error.textContent = "รหัสไม่ถูกต้อง";
    pin = "";
    updateDots();
  }
}
</script>

</body>
</html>
