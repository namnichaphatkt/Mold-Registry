<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mold Register</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222535; --border:#2e3248;
  --accent:#4f8ef7; --green:#22d3a5; --yellow:#f5c842; --red:#f75a5a;
  --text:#e8eaf2; --text2:#8b90a8; --text3:#5a5f77;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:320px;max-width:90vw;text-align:center;}
.login-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all 0.2s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px rgba(79,142,247,0.5);}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pin-key{
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;
  padding:16px;cursor:pointer;user-select:none;
  touch-action:manipulation;
  -webkit-touch-callout:none;
}
.pin-key:active{transform:scale(0.93);background:var(--border);}
.pin-key.del{font-size:16px;color:var(--text3);}
.pin-key.empty{visibility:hidden;pointer-events:none;}
.login-error{color:var(--red);font-size:13px;margin-top:14px;min-height:20px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake 0.3s ease;}
#mainApp{display:none;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.header-count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);}
.search-bar{padding:20px 28px 0;}
.search-input-wrap{position:relative;max-width:600px;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;padding:12px 14px 12px 42px;outline:none;}
input[type=text]:focus{border-color:var(--accent);}
input[type=text]::placeholder{color:var(--text3);}
.filters{padding:12px 28px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:13px;color:var(--text3);}
select{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px;padding:7px 10px;outline:none;}
.admin-bar{padding:0 28px 4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.result-info{padding:8px 28px;font-size:13px;color:var(--text3);}
.result-info span{color:var(--accent);font-weight:600;}
.table-wrap{padding:0 28px 28px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
thead th{background:var(--surface);color:var(--text3);font-weight:500;font-size:12px;letter-spacing:0.5px;text-transform:uppercase;padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;}
thead th.sorted{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;}
tbody tr:hover{background:var(--surface);}
tbody td{padding:11px 14px;vertical-align:middle;}
.td-no{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);}
.td-code{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);font-weight:500;}
.td-name{font-weight:500;}
.td-client{font-size:13px;color:var(--text2);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.td-size{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3);white-space:nowrap;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge-current{background:rgba(34,211,165,0.15);color:var(--green);}
.badge-runout{background:rgba(247,90,90,0.13);color:var(--red);}
.badge-new{background:rgba(79,142,247,0.15);color:var(--accent);}
.badge-service{background:rgba(245,200,66,0.15);color:var(--yellow);}
.badge-cancel{background:rgba(247,90,90,0.1);color:#f79090;}
.badge-other{background:rgba(139,144,168,0.15);color:var(--text3);}
.badge-success{background:rgba(34,211,165,0.15);color:var(--green);}
.badge-fail{background:rgba(247,90,90,0.13);color:var(--red);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:13px;padding:8px 14px;cursor:pointer;touch-action:manipulation;}
.btn-green{color:var(--green);}
.btn-blue{color:var(--accent);}
.btn-yellow{color:var(--yellow);}
.btn-edit{color:var(--text2);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:560px;max-width:95vw;max-height:85vh;overflow-y:auto;padding:28px;position:relative;}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;touch-action:manipulation;}
.modal-code{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);margin-bottom:6px;}
.modal-name{font-size:20px;font-weight:700;margin-bottom:18px;line-height:1.3;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.modal-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:4px;}
.modal-field .val{font-size:14px;font-weight:500;}
.modal-field .val.mono{font-family:'IBM Plex Mono',monospace;font-size:13px;}
.modal-field.full{grid-column:1/-1;}
.modal-divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.edit-form{display:none;margin-top:18px;}
.edit-form.open{display:block;}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.edit-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:5px;}
.edit-field input,.edit-field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;padding:9px 11px;}
.edit-field.full{grid-column:1/-1;}
.save-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;padding:10px 22px;cursor:pointer;margin-top:6px;touch-action:manipulation;}
.save-notice{display:none;color:var(--green);font-size:13px;margin-top:10px;font-weight:500;}
.history-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px;}
.history-table th{background:var(--surface2);color:var(--text3);font-size:11px;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
.history-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">Mold Register</div>
    <div class="login-sub">กรอกรหัสผ่าน 4 หลักเพื่อเข้าใช้งาน</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad" id="pinKeypad">
      <button class="pin-key" data-v="1">1</button>
      <button class="pin-key" data-v="2">2</button>
      <button class="pin-key" data-v="3">3</button>
      <button class="pin-key" data-v="4">4</button>
      <button class="pin-key" data-v="5">5</button>
      <button class="pin-key" data-v="6">6</button>
      <button class="pin-key" data-v="7">7</button>
      <button class="pin-key" data-v="8">8</button>
      <button class="pin-key" data-v="9">9</button>
      <button class="pin-key empty" disabled></button>
      <button class="pin-key" data-v="0">0</button>
      <button class="pin-key del" id="delBtn">&#9003;</button>
    </div>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="mainApp">
  <header>
    <div style="font-size:18px;font-weight:700">Mold Register</div>
    <div class="header-count" id="totalCount"></div>
  </header>
  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="ค้นหา Mold Code, ชื่อ, รหัส T..." autocomplete="off">
    </div>
  </div>
  <div class="filters">
    <span class="filter-label">สถานะ:</span>
    <select id="filterStatus">
      <option value="">ทั้งหมด</option>
      <option value="Current">Current</option>
      <option value="Run out">Run out</option>
      <option value="New mold">New mold</option>
      <option value="Service">Service</option>
      <option value="ยกเลิก">ยกเลิก</option>
    </select>
    <span class="filter-label" style="margin-left:8px">สถานที่เก็บ:</span>
